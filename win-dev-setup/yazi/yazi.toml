"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

# Yazi 配置 —— 覆盖需要改的项，其他保持默认

[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden    = false
linemode       = "size_and_mtime"

# Git 插件 fetcher（显示文件的 git 状态）
[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "git"

[preview]
wrap          = "no"
max_width     = 600
max_height    = 900
image_filter  = "triangle"
image_quality = 75

# 回车用 nvim 打开文本文件（Windows 路径，macOS 路径参考下方注释）
[opener]
edit = [
  { run = '"C:\Program Files\Neovim\bin\nvim.exe" %*', desc = "Edit in Neovim", block = true, for = "windows" },
  { run = 'nvim "$@"',                                   desc = "Edit in Neovim", block = true, for = "unix"    },
]

[open]
prepend_rules = [
  { mime = "text/*",                                              use = [ "edit", "reveal" ] },
  { mime = "application/{json,xml,toml,yaml,x-yaml,javascript}",  use = [ "edit", "reveal" ] },
  { name = "*.{md,lua,rs,py,go,ts,tsx,js,jsx,toml,yml,yaml,conf,ini,log,sh,ps1}",
    use  = [ "edit", "reveal" ] },
]
